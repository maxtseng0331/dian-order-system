<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dian³ - 配餐選擇</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #fcfaf2; padding: 20px; }
        .brand { text-align: center; font-size: 2rem; font-weight: bold; color: #d9534f; margin-bottom: 30px; }
        .side-card {
            background: white; border-radius: 15px; padding: 20px; margin: 0 auto 20px auto;
            max-width: 600px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-left: 8px solid #ffcc33;
        }
        .side-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; color: #555; }
        .side-option {
            display: inline-flex; align-items: center; margin: 10px; padding: 10px 15px;
            background: #f8f9fa; border-radius: 50px; cursor: pointer; transition: 0.2s;
        }
        .side-option:hover { background: #e9ecef; }
        input[type="checkbox"] { transform: scale(1.3); margin-right: 10px; cursor: pointer; }
        .checkout-btn {
            display: block; width: 250px; margin: 40px auto; padding: 15px;
            background: #28a745; color: white; border: none; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(40,167,69,0.3);
        }
    </style>
</head>
<body>
    <div class="brand">Dian<sup>3</sup> 配餐加購</div>

    <form action="/checkout" method="post">
        {% for main_name, info in selected_items.items() %}
            <div class="side-card">
                <div class="side-title">🍲 {{ main_name }} 的專屬配餐：</div>
                <input type="hidden" name="main_dishes" value="{{ main_name }}">
                
                {% for side in info.sides %}
                    <label class="side-option">
                        <input type="checkbox" name="side_dishes" value="{{ side }}"> {{ side }}
                    </label>
                {% endfor %}
            </div>
        {% endfor %}

        <button type="submit" class="checkout-btn">💰 確認訂單並結帳</button>
    </form>
</body>
</html>
