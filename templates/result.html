<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>結帳明細 - Dian³ 美味食堂</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        /* 收據主體卡片 */
        .receipt-card {
            background-color: white;
            width: 350px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 10px solid #d9534f; /* 頂部裝飾條 */
            position: relative;
        }

        /* 標題與 Dian³ */
        .brand {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .brand sup { font-size: 0.8rem; }
        
        .title {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border-bottom: 2px dashed #eee;
            padding-bottom: 10px;
        }

        /* 明細清單 */
        .item-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 1rem;
        }

        .category-label {
            font-weight: bold;
            color: #d9534f;
            margin-top: 15px;
            border-left: 4px solid #d9534f;
            padding-left: 8px;
        }

        /* 總金額區塊 */
        .total-section {
            margin-top: 30px;
            border-top: 2px solid #333;
            padding-top: 15px;
            text-align: right;
        }

        .total-amount {
            font-size: 1.5rem;
            color: #d9534f;
            font-weight: bold;
        }

        /* 返回按鈕 */
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 30px;
            padding: 10px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .back-btn:hover { background-color: #555; }
    </style>
</head>
<body>

    <div class="receipt-card">
        <div class="brand">Dian<sup>3</sup> 美味食堂</div>
        <div class="title">感謝您的光臨，這是您的點餐明細</div>

        <div class="category-label">🍲 精選主餐</div>
        {% for main in mains %}
        <div class="item-row">
            <span>{{ main }}</span>
            <span>$ {{ menu[main].price }}</span>
        </div>
        {% endfor %}

        <div class="category-label">🥗 加購配餐</div>
        {% if sides %}
            {% for side in sides %}
            <div class="item-row">
                <span>{{ side }}</span>
                <span>$ 30</span>
            </div>
            {% endfor %}
        {% else %}
            <div class="item-row" style="color:#ccc;">(無加購配餐)</div>
        {% endif %}

        <div class="total-section">
            <div>應付總額</div>
            <div class="total-amount">NT$ {{ total_price }}</div>
        </div>

        <a href="/" class="back-btn">返回首頁重新點餐</a>
    </div>

</body>
</html>
