<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>質感點餐系統</title>
    <style>
        /* 1. 設定整體的背景與字體 */
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f8f9fa; /* 輕微的灰色背景，看起來比較高級 */
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #d9534f; /* 溫暖的食物紅 */
            margin-bottom: 30px;
        }

        /* 2. 把食物選項變成「卡片」 */
        .food-card {
            background: white;
            border-radius: 12px; /* 圓角 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* 淡淡的陰影 */
            margin-bottom: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            transition: transform 0.2s; /* 滑鼠移上去的動畫效果 */
        }

        .food-card:hover {
            transform: translateY(-5px); /* 滑鼠移上去會輕微浮起 */
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* 3. 美化圖片 */
        .food-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            margin: 0 20px;
        }

        /* 4. 美化按鈕 */
        .btn-container {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 10px;
            transition: opacity 0.3s;
        }

        .btn-continue { background-color: #6c757d; color: white; }
        .btn-next { background-color: #28a745; color: white; }
        .btn:hover { opacity: 0.8; }

        /* 5. 把勾選框變大一點 */
        input[type="checkbox"] {
            transform: scale(1.5);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🍜 {{ category }}類選擇區</h1>
    
    <form action="/add_to_order" method="post">
        {% for name, info in items.items() %}
            <div class="food-card">
                <input type="checkbox" name="dish" value="{{ name }}">
                
                <img src="{{ info.image }}" class="food-img" alt="{{ name }}">
                
                <div style="flex-grow: 1;">
                    <div style="font-size: 1.25rem; font-weight: bold;">{{ name }}</div>
                    <div style="color: #e44d26; font-size: 1.1rem; margin-top: 5px;">$ {{ info.price }}</div>
                </div>
            </div>
        {% endfor %}
        
        <div class="btn-container">
            <button type="submit" name="next_step" value="continue" class="btn btn-continue">再選別的種類</button>
            <button type="submit" name="next_step" value="sides" class="btn btn-next">選好了，去選配餐</button>
        </div>
    </form>
</body>
</html>
